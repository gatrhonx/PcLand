font_family      JetBrains Mono
font_size 11

cursor #ad8ee6
cursor_trail 10
cursor_trail_start_threshold 0
cursor_trail_decay 0.001 0.2
cursor_shape block
cursor_blink true



# - Visuales de la terminal - #
cursor_text_color background
background_opacity 0.75
window_padding_width 5

[blur]
background=true

foreground #a9b1d6
background #1a1b26

# Black
color0 #32344a
color8 #444b6a

# Red
color1 #f7768e
color9 #ff7a93

# Green
color2  #9ece6a
color10 #b9f27c

# Yellow
color3  #e0af68
color11 #ff9e64

# Blue
color4  #7aa2f7
color12 #7da6ff

# Magenta
color5  #ad8ee6
color13 #bb9af7

# Cyan
color6  #449dab
color14 #0db9d7

# White
